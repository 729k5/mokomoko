<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Vortex Kaleidoscope</title>
    <style>
        /* 画面全体のスタイル設定 */
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000; /* 暗闇でネオンを最高に引き立たせる */
            font-family: 'Helvetica Neue', Arial, sans-serif;
        }
        canvas {
            display: block;
            cursor: crosshair; /* カーソルを十字にしてアート感を演出 */
        }
        /* 中央のアナウンス文字 */
        .info {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: rgba(255, 255, 255, 0.7);
            text-align: center;
            pointer-events: none;
            transition: opacity 1s;
            user-select: none;
        }
        h1 {
            font-weight: 300;
            font-size: 2rem;
            letter-spacing: 4px;
            margin-bottom: 10px;
            text-shadow: 0 0 10px rgba(255,255,255,0.5);
        }
        p {
            font-size: 0.9rem;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="info" id="info">
        <h1>NEON KALEIDOSCOPE</h1>
        <p>画面の上でマウスをゆっくり動かしてみてね</p>
        <p style="font-size: 0.8rem; margin-top: 15px; color: #ff99cc; text-shadow: 0 0 5px rgba(255,153,204,0.5);">＼ クリックすると大爆発！ ／</p>
    </div>

    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const info = document.getElementById('info');

        // 画面サイズに合わせる
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        let mouse = { x: 0, y: 0, px: 0, py: 0, active: false };
        let hue = 0; // 虹色に変化させるための色相
        let firstMove = true;
        let particles = []; // クリック時の爆発パーティクル用

        // クリック時に飛び散る光の粒クラス
        class BurstParticle {
            constructor(x, y, angle, speed, color) {
                this.x = x;
                this.y = y;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.radius = Math.random() * 3 + 2;
                this.color = color;
                this.alpha = 1;
                this.decay = Math.random() * 0.02 + 0.015;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.alpha -= this.decay;
            }
            draw(ctx) {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.fillStyle = this.color;
                ctx.shadowBlur = 10;
                ctx.shadowColor = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        // マウスを動かしたときの処理
        window.addEventListener('mousemove', (e) => {
            if (firstMove) {
                info.style.opacity = 0; // 動かし始めたら中央の文字を消す
                firstMove = false;
                mouse.x = e.clientX;
                mouse.y = e.clientY;
            }
            mouse.px = mouse.x;
            mouse.py = mouse.y;
            mouse.x = e.clientX;
            mouse.y = e.clientY;
            mouse.active = true;
        });

        window.addEventListener('mouseleave', () => {
            mouse.active = false;
        });

        // クリックで万華鏡パターンの大爆発
        window.addEventListener('mousedown', (e) => {
            let cx = canvas.width / 2;
            let cy = canvas.height / 2;
            // 中心からの相対座標
            let rx = e.clientX - cx;
            let ry = e.clientY - cy;
            
            let symmetry = 8;
            let baseColor = `hsl(${hue}, 100%, 65%)`;

            // 万華鏡の対称位置すべてで同時に爆発を起こす
            for (let i = 0; i < symmetry; i++) {
                let symAngle = (Math.PI * 2 / symmetry) * i;
                
                // 鏡像（上下反転）を計算
                let currentX = rx;
                let currentY = (i % 2 === 0) ? ry : -ry;

                // 回転座標の計算
                let rotX = currentX * Math.cos(symAngle) - currentY * Math.sin(symAngle);
                let rotY = currentX * Math.sin(symAngle) + currentY * Math.cos(symAngle);

                // 1箇所につき15粒のパーティクルを四方に散らす
                for (let p = 0; p < 15; p++) {
                    let pAngle = Math.random() * Math.PI * 2;
                    let speed = Math.random() * 5 + 2;
                    particles.push(new BurstParticle(rotX, rotY, pAngle, speed, baseColor));
                }
            }
        });

        // メインループ
        function animate() {
            // 【超重要】前のフレームをわずかに「回転＋縮小」して重ね描きする（これで吸い込まれる渦ができる）
            ctx.save();
            ctx.translate(canvas.width / 2, canvas.height / 2);
            ctx.rotate(0.003); // 絶妙な回転速度
            ctx.scale(0.985, 0.985); // じわじわ中心に小さくなっていく
            ctx.drawImage(canvas, -canvas.width / 2, -canvas.height / 2);
            ctx.restore();

            // 残像を綺麗に引かせるために、ごく薄い黒で上書き
            ctx.fillStyle = 'rgba(0, 0, 0, 0.04)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            let cx = canvas.width / 2;
            let cy = canvas.height / 2;

            ctx.save();
            ctx.translate(cx, cy); // 描画の基準を画面の中心にする
            ctx.globalCompositeOperation = 'lighter'; // 光を重ねて眩しくする

            // マウスが動いていれば万華鏡の線を描画
            if (mouse.active && (mouse.x !== mouse.px || mouse.y !== mouse.py)) {
                let x = mouse.x - cx;
                let y = mouse.y - cy;
                let px = mouse.px - cx;
                let py = mouse.py - cy;

                let symmetry = 8; // 8回対称
                let angleStep = (Math.PI * 2) / symmetry;
                let currentColor = `hsl(${hue}, 100%, 60%)`;

                for (let i = 0; i < symmetry; i++) {
                    ctx.save();
                    ctx.rotate(angleStep * i);

                    ctx.strokeStyle = currentColor;
                    // マウスを素早く動かすほど線が太くなる仕様
                    ctx.lineWidth = Math.min(Math.abs(x - px) + 1, 8); 
                    ctx.lineCap = 'round';
                    ctx.shadowBlur = 15;
                    ctx.shadowColor = currentColor;

                    ctx.beginPath();
                    if (i % 2 === 0) {
                        ctx.moveTo(px, py);
                        ctx.lineTo(x, y);
                    } else {
                        ctx.moveTo(px, -py); // 鏡像（上下反転）させることで綺麗な幾何学に
                        ctx.lineTo(x, -y);
                    }
                    ctx.stroke();
                    ctx.restore();
                }
                
                // 前回の位置を更新
                mouse.px = mouse.x;
                mouse.py = mouse.y;
            }

            // 爆発パーティクルの更新と描画
            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].draw(ctx);
                if (particles[i].alpha <= 0) {
                    particles.splice(i, 1);
                    i--;
                }
            }

            ctx.restore();

            // 色をグラデーションさせるために色相を毎フレーム進める
            hue = (hue + 0.5) % 360;

            requestAnimationFrame(animate);
        }

        // アニメーション開始
        animate();
    </script>
</body>
</html>
